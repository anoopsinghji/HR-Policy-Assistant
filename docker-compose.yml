
services:

  backend:

    build:
      context: ./backend

    container_name: hr-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/documents:/app/documents


    restart: unless-stopped

  frontend:

    build:
      context: ./frontend

    container_name: hr-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped